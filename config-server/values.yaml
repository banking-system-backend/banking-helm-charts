replicaCount: 1

image:
  repository: abayisenga/banking-config-server
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

service:
  name: config-server
  type: ClusterIP
  port: 8888

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "250m"

env:
  javaOpts: "-Xms128m -Xmx256m"

extraEnv: []
