apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.fullname" . }}-initdb
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
data:
  init-multiple-databases.sql: |
    -- Create additional databases for the banking services
    {{- if .Values.auth.extraDatabases }}
    {{- range .Values.auth.extraDatabases }}
    CREATE DATABASE "{{ . }}" OWNER "{{ $.Values.auth.username }}";
    {{- end }}
    {{- end }}

