replicaCount: 1

image:
  repository: abayisenga/banking-discovery-server
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

service:
  name: discovery-server
  type: ClusterIP
  port: 8761

config:
  serverUrl: "http://config-server:8888"

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "250m"

env:
  javaOpts: "-Xms128m -Xmx256m"

initContainers:
  waitForConfigServer: true

extraEnv: []
